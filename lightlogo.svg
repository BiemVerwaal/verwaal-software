<svg viewBox="0 0 240 140" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .dot-dark { fill: #1a1a1a; }
            .dot-accent { fill: #2563EB; }
        </style>
    </defs>
    
    <!-- V Logo uit dots -->
    <!-- Linkerkant V (van boven naar beneden) -->
    <!-- Rij 1 -->
    <rect class="dot-dark" x="30" y="10" width="8" height="8" rx="1"/>
    
    <!-- Rij 2 -->
    <rect class="dot-dark" x="25" y="20" width="8" height="8" rx="1"/>
    <rect class="dot-dark" x="40" y="20" width="8" height="8" rx="1"/>
    
    <!-- Rij 3 -->
    <rect class="dot-dark" x="20" y="30" width="8" height="8" rx="1"/>
    <rect class="dot-dark" x="45" y="30" width="8" height="8" rx="1"/>
    
    <!-- Rij 4 -->
    <rect class="dot-dark" x="15" y="40" width="8" height="8" rx="1"/>
    <rect class="dot-dark" x="50" y="40" width="8" height="8" rx="1"/>
    
    <!-- Rij 5 -->
    <rect class="dot-dark" x="10" y="50" width="8" height="8" rx="1"/>
    <rect class="dot-dark" x="55" y="50" width="8" height="8" rx="1"/>
    
    <!-- Rij 6 -->
    <rect class="dot-dark" x="5" y="60" width="8" height="8" rx="1"/>
    <rect class="dot-dark" x="60" y="60" width="8" height="8" rx="1"/>
    
    <!-- Rij 7 -->
    <rect class="dot-accent" x="10" y="70" width="8" height="8" rx="1"/>
    <rect class="dot-dark" x="55" y="70" width="8" height="8" rx="1"/>
    
    <!-- Rij 8 -->
    <rect class="dot-accent" x="15" y="80" width="8" height="8" rx="1"/>
    <rect class="dot-accent" x="50" y="80" width="8" height="8" rx="1"/>
    
    <!-- Rij 9 -->
    <rect class="dot-accent" x="20" y="90" width="8" height="8" rx="1"/>
    <rect class="dot-accent" x="45" y="90" width="8" height="8" rx="1"/>
    
    <!-- Rij 10 -->
    <rect class="dot-accent" x="25" y="100" width="8" height="8" rx="1"/>
    <rect class="dot-accent" x="40" y="100" width="8" height="8" rx="1"/>
    
    <!-- Rij 11 (bottom point) -->
    <rect class="dot-accent" x="30" y="110" width="8" height="8" rx="1"/>
    
    <!-- Tekst -->
    <text x="120" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">Verwaal</text>
    <text x="130" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#666" letter-spacing="1">SOFTWARE</text>
</svg>